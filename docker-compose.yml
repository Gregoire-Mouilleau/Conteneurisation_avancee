services:

  # ── Reverse proxy HTTPS ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - php-prod
      - php-dev
    restart: unless-stopped

  # ── PHP / MySQL (prod) ──────────────────────────────────────────────────────
  php-prod:
    build: ./php
    environment:
      DB_HOST:     db
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - uploads-prod:/var/www/html/uploads
    depends_on:
      - db
    restart: unless-stopped

  db:
    build: ./mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  # ── PHP / PostgreSQL (dev) ──────────────────────────────────────────────────
  php-dev:
    build: ./php-pgsql
    environment:
      DB_HOST:     postgres
      DB_NAME:     ${DEV_DB_NAME}
      DB_USER:     ${DEV_DB_USER}
      DB_PASSWORD: ${DEV_DB_PASSWORD}
      DB_PORT:     5432
    volumes:
      - uploads-dev:/var/www/html/uploads
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB:       ${DEV_DB_NAME}
      POSTGRES_USER:     ${DEV_DB_USER}
      POSTGRES_PASSWORD: ${DEV_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

volumes:
  mysql-data:
  postgres-data:
  uploads-prod:
  uploads-dev:
